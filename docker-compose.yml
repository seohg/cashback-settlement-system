version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: cashback-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: cashback
      MYSQL_USER: cashback_user
      MYSQL_PASSWORD: cashback1234
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: